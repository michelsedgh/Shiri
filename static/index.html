<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiri Audio Console</title>
    <meta name="description" content="Shiri room audio routing console">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <div class="brand-mark">S</div>
            <div>
                <h1>Shiri</h1>
                <span id="room-count">Loading</span>
            </div>
        </div>
        <div class="status-strip">
            <div id="shiri-status" class="status-pill muted">
                <span class="dot"></span>
                <span>Shiri</span>
            </div>
            <div id="lionos-status" class="status-pill muted">
                <span class="dot"></span>
                <span>LionOS</span>
            </div>
            <div id="default-room" class="status-pill muted">
                <span>Default room</span>
            </div>
        </div>
        <nav class="top-actions" aria-label="Primary actions">
            <button id="refresh-dashboard" class="icon-btn" title="Refresh" aria-label="Refresh">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.4 6.4L3 16m0 5v-5h5M3 12A9 9 0 0 1 18.4 5.6L21 8m0-5v5h-5"/></svg>
            </button>
            <button id="open-injector" class="text-btn">Inject</button>
            <button id="open-diagnostics" class="text-btn">Diagnostics</button>
            <button id="open-settings" class="text-btn">Settings</button>
        </nav>
    </header>

    <main class="shell">
        <section class="console-head">
            <div>
                <h2>Rooms</h2>
                <p id="console-subtitle">Loading</p>
            </div>
            <div id="global-error" class="global-error" hidden></div>
        </section>

        <section id="room-list" class="room-list" aria-live="polite">
            <div class="empty-state">Loading rooms</div>
        </section>
    </main>

    <aside id="room-drawer" class="side-panel" aria-hidden="true">
        <div class="panel-head">
            <div>
                <span id="drawer-room-source" class="eyebrow">Room</span>
                <h2 id="drawer-room-name">Room</h2>
            </div>
            <button id="close-room-drawer" class="icon-btn" title="Close" aria-label="Close">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="panel-tabs" role="tablist">
            <button class="tab active" data-drawer-tab="setup">Setup</button>
            <button class="tab" data-drawer-tab="speakers">Speakers</button>
            <button class="tab" data-drawer-tab="advanced">Advanced</button>
        </div>
        <div id="drawer-setup" class="panel-section"></div>
        <div id="drawer-speakers" class="panel-section" hidden></div>
        <div id="drawer-advanced" class="panel-section" hidden></div>
    </aside>

    <section id="diagnostics-panel" class="diagnostics-panel" aria-hidden="true">
        <div class="diagnostics-head">
            <div>
                <span class="eyebrow">Diagnostics</span>
                <h2>Event Feed</h2>
            </div>
            <div class="diagnostics-actions">
                <select id="diag-room-filter" aria-label="Room filter"></select>
                <select id="diag-type-filter" aria-label="Log filter">
                    <option value="all">All</option>
                    <option value="tts">TTS</option>
                    <option value="speaker">Speaker</option>
                    <option value="volume">Volume</option>
                    <option value="airplay">AirPlay</option>
                    <option value="owntone">OwnTone</option>
                    <option value="errors">Errors</option>
                </select>
                <button id="toggle-live-logs" class="text-btn">Pause</button>
                <button id="refresh-logs" class="icon-btn" title="Refresh logs" aria-label="Refresh logs">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.4 6.4L3 16m0 5v-5h5M3 12A9 9 0 0 1 18.4 5.6L21 8m0-5v5h-5"/></svg>
                </button>
                <button id="close-diagnostics" class="icon-btn" title="Close" aria-label="Close">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div id="log-feed" class="log-feed"></div>
    </section>

    <section id="inject-panel" class="modal-backdrop" aria-hidden="true">
        <div class="inject-modal">
            <div class="panel-head">
                <div>
                    <span class="eyebrow">Injection</span>
                    <h2>Room Test Audio</h2>
                </div>
                <button id="close-injector" class="icon-btn" title="Close" aria-label="Close">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="inject-body">
                <form id="inject-built-in-form" class="stacked-form">
                    <label class="field">
                        <span>Room</span>
                        <select id="inject-room"></select>
                    </label>
                    <label class="field">
                        <span>Clip</span>
                        <select id="inject-clip"></select>
                    </label>
                    <button class="primary-btn" type="submit">Inject Clip</button>
                </form>
                <form id="inject-upload-form" class="stacked-form">
                    <label class="field">
                        <span>WAV upload</span>
                        <input id="inject-file" type="file" accept=".wav,audio/wav,audio/x-wav">
                    </label>
                    <button class="primary-btn" type="submit">Inject WAV</button>
                </form>
            </div>
        </div>
    </section>

    <section id="settings-panel" class="modal-backdrop" aria-hidden="true">
        <div class="settings-modal">
            <div class="panel-head">
                <div>
                    <span class="eyebrow">Settings</span>
                    <h2>Shiri Setup</h2>
                </div>
                <button id="close-settings" class="icon-btn" title="Close" aria-label="Close">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <form id="settings-form" class="form-grid">
                <label class="field span-2">
                    <span>LionOS API</span>
                    <input id="lionos-base-url" type="url" placeholder="http://192.168.1.198:7001">
                </label>
                <button class="primary-btn" type="submit">Save Settings</button>
            </form>

            <div class="settings-columns">
                <section>
                    <div class="section-title">
                        <h3>Zones</h3>
                        <button id="refresh-settings" class="small-btn" type="button">Refresh</button>
                    </div>
                    <div id="settings-zones" class="settings-list"></div>
                </section>

                <section>
                    <div class="section-title">
                        <h3>Create Zone</h3>
                    </div>
                    <form id="create-zone-form" class="stacked-form">
                        <label class="field">
                            <span>AirPlay name</span>
                            <input id="new-zone-name" type="text" required autocomplete="off">
                        </label>
                        <label class="field">
                            <span>Room id</span>
                            <input id="new-zone-room-id" type="text" autocomplete="off">
                        </label>
                        <label class="field">
                            <span>Room name</span>
                            <input id="new-zone-room-name" type="text" autocomplete="off">
                        </label>
                        <label class="field">
                            <span>Network interface</span>
                            <select id="new-zone-interface" required></select>
                        </label>
                        <label class="check-field">
                            <input id="new-zone-autostart" type="checkbox">
                            <span>Auto-start</span>
                        </label>
                        <label class="check-field">
                            <input id="new-zone-default" type="checkbox">
                            <span>Default TTS room</span>
                        </label>
                        <button class="primary-btn" type="submit">Create Zone</button>
                    </form>
                </section>
            </div>
        </div>
    </section>

    <div id="toast" class="toast" hidden></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script type="module" src="/js/main.js"></script>
</body>
</html>
