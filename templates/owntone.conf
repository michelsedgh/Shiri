# OwnTone config for %%ZONE_ID%% (runs in the shared OwnTone sender namespace)

general {
	uid = "root"
	db_path = "%%GRP_DIR%%/state/songs3.db"
	logfile = "%%GRP_DIR%%/logs/owntone.log"
	loglevel = log
	admin_password = ""
	websocket_port = %%OWNTONE_WEBSOCKET_PORT%%
	ipv6 = no
	cache_dir = "%%GRP_DIR%%/state/cache"
	cache_daap_threshold = 1000
	speaker_autoselect = no
	high_resolution_clock = yes
	start_buffer_ms = 500
}

library {
	name = "%%DISPLAY_NAME%% Library"
	port = %%OWNTONE_PORT%%
	directories = { "%%GRP_DIR%%/pipes" }
	follow_symlinks = false
	filescan_disable = false
	pipe_autostart = true
	pipe_sample_rate = 48000
	pipe_bits_per_sample = 16
	clear_queue_on_stop_disable = true
}

audio {
	type = "alsa"
	card = "default"
	nickname = "Local Output"
}

mpd {
	port = %%OWNTONE_MPD_PORT%%
}

streaming {
	sample_rate = 48000
	bit_rate = 192
}

%%AIRPLAY_DEVICE_BLOCKS%%
